<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title>Arabinda Saha web asset source note</title>
  <desc>Web assets are exported from the nine final authored PNGs in assets/photos. Generated by scripts/generate_web_assets.py.</desc>
  <rect width="1200" height="630" rx="36" fill="#9b613c"/>
  <rect x="58" y="58" width="1084" height="514" rx="28" fill="#f5ead9" opacity="0.18"/>
  <text x="86" y="150" fill="#fff4df" font-family="Georgia, serif" font-size="64" font-weight="700">Arabinda Saha</text>
  <text x="88" y="220" fill="#ffd9ad" font-family="Arial, sans-serif" font-size="32">Web asset source mapping</text>
  <text x="88" y="260" fill="#fff4df" font-family="Arial, sans-serif" font-size="22">Canonical source folder: assets/photos</text>
  <text x="88" y="300" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(1) spacious square: retained source variant</text>
  <text x="88" y="330" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(2) zoomed square: favicon 16, favicon 32, ICO 16/32</text>
  <text x="88" y="360" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(3) medium square: ICO 48</text>
  <text x="88" y="390" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(4) 96 square: favicon 96 and ICO 96</text>
  <text x="88" y="420" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(5) square: android-chrome-512x512.png</text>
  <text x="88" y="450" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(6) square: android-chrome-192x192.png</text>
  <text x="88" y="480" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(7) square: apple-touch-icon.png</text>
  <text x="88" y="510" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(8) wide: og-image.png and og-image.jpg</text>
  <text x="88" y="540" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">(9) wide: twitter-image.png and twitter-image.jpg with soft padding</text>
  <text x="88" y="570" fill="#fff4df" font-family="Arial, sans-serif" font-size="18">Profile picture.png: profile-540.webp and profile-1080.webp</text>
</svg>
